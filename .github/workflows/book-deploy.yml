name: deploy-book
on:
  push:
    branches:
      - main

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.9
        uses: actions/setup-python@v2
        with:
          python-version: 3.9
      - uses: s-weigand/setup-conda@v1
      - run: conda --version
      - run: which python
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          conda install ipykernel
          python -m ipykernel install --user --name ai --display-name "ai"
      - name: Install theme
        run: |
          git clone https://github.com/xinetzone/xin-css.git docs/_static/xin-css
          git clone https://github.com/xinetzone/w3css.git docs/_static/w3css

      - name: Build the book
        run: |
          pip install mystmd  # 显式安装最新 mystmd 引擎
          jupyter-book build . --site

      - name: GitHub Pages action
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/site  # 确保指向 mystmd 的默认输出
